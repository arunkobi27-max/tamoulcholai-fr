<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>பொதுத்தேர்வு | தமிழ் சோலை</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Kavivanar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL THEME --- */
        :root {
            --primary: #27ae60;      /* பச்சை - வெற்றி */
            --primary-dark: #1e8449;
            --secondary: #2c3e50;
            --accent: #f1c40f;       /* தங்கம் */
            --white: #ffffff;
            --bg-light: #f4f7f6;
            --gradient: linear-gradient(135deg, #27ae60, #2ecc71);
            --shadow-rich: 0 15px 35px rgba(39, 174, 96, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Baloo Thambi 2', cursive;
            background-color: var(--bg-light);
            color: var(--secondary);
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        header {
            background: rgba(44, 62, 80, 0.98);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 10px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo a {
            display: flex; align-items: center; text-decoration: none;
            color: var(--accent); font-family: 'Kavivanar', cursive; font-size: 1.8rem;
        }

        .logo img { height: 50px; margin-right: 12px; }

        nav ul { display: flex; list-style: none; gap: 8px; }
        nav ul li a {
            color: white; text-decoration: none; font-weight: 600;
            padding: 10px 18px; border-radius: 10px; transition: 0.3s;
        }

        nav ul li a:hover, nav ul li a.active { background: var(--primary); }

        /* --- BANNER (பெரிய தலைப்பு) --- */
        .page-banner {
            background: linear-gradient(rgba(39, 174, 96, 0.8), rgba(44, 62, 80, 0.85)), 
                        url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&q=80&w=1500');
            background-size: cover;
            background-position: center;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
            text-align: center;
        }

        .page-banner h1 {
            font-family: 'Kavivanar', cursive;
            font-size: 4rem; /* தலைப்பு பெரிதாக்கப்பட்டுள்ளது */
            text-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* --- CONTENT SECTION --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .section-title-left {
            font-family: 'Kavivanar', cursive;
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .underline-left {
            width: 80px; height: 6px; background: var(--accent);
            border-radius: 10px; margin-bottom: 40px;
        }

        /* PDF Grid */
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .pdf-card {
            background: var(--white);
            border-radius: 25px;
            overflow: hidden;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 6px solid var(--primary);
            display: flex;
            flex-direction: column;
        }

        .pdf-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-rich);
        }

        .pdf-card img {
            width: 100%; height: 180px; object-fit: cover;
            filter: brightness(0.9);
        }

        .pdf-info { padding: 25px; text-align: center; }
        .pdf-info h3 { font-size: 1.4rem; color: var(--secondary); margin-bottom: 15px; }
        
        .pdf-btn {
            display: inline-block;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .pdf-card:hover .pdf-btn { background: var(--primary-dark); padding: 10px 35px; }

        /* Back Button */
        .back-btn {
            display: inline-block;
            padding: 15px 45px;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
            margin-top: 50px;
        }
        .back-btn:hover { background: var(--primary-dark); transform: scale(1.05); }

        /* --- FOOTER --- */
        footer {
            background: var(--secondary);
            color: white;
            padding: 80px 20px 40px;
            text-align: center;
            clip-path: polygon(0 15%, 100% 0, 100% 100%, 0 100%);
            margin-top: 80px;
        }
        footer strong { color: var(--accent); }

        @media (max-width: 768px) {
            .page-banner h1 { font-size: 2.5rem; }
            .pdf-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="https://www.tamoulcholai.fr/img/logo/logo.png" alt="Logo">
                    தமிழ்ச்சோலை
                </a>
            </div>
            <ul>
                <li><a href="index.html">முகப்பு</a></li>
                <li><a href="about.html">எம்மைப்பற்றி</a></li>
                <li><a href="activities.html">செயற்பாடுகள்</a></li>
                <li><a href="events.html">நிகழ்வுகள்</a></li>
                <li><a href="files.html" class="active">கோப்புகள்</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-banner">
        <h1>பொதுத்தேர்வு</h1>
    </div>

    <main class="container">
        <section class="year-section">
            <h2 class="section-title-left">வினாத்தாள்கள் (2024 - 2025)</h2>
            <div class="underline-left"></div>
            
            <div class="pdf-grid">
                <script>
                    for (let i = 1; i <= 12; i++) {
                        let fileName = i < 10 ? `0${i}` : i;
                        document.write(`
                            <a href="pdfs/public/${fileName}-2025.pdf" target="_blank" class="pdf-card">
                                <img src="https://www.tamoulcholai.fr/admin-page/uploads/koppukal_covers/default_cover.png" alt="வளர் தமிழ் ${i}">
                                <div class="pdf-info">
                                    <h3>வளர் தமிழ் ${i}</h3>
                                    <span class="pdf-btn"><i class="fas fa-file-pdf"></i> வினாத்தாள் பார்க்க</span>
                                </div>
                            </a>
                        `);
                    }
                </script>
            </div>
        </section>

        <div style="text-align: center;">
            <a href="files.html" class="back-btn"><i class="fas fa-arrow-left"></i> கோப்புகள் பக்கத்திற்குச் செல்ல</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 <strong>தமிழ் சோலை</strong> | நம் வாழ்வும் வளமும் தமிழ்மொழி என்போம்</p>
    </footer>

</body>
</html>
